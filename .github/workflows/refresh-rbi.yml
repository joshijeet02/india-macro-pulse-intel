name: refresh-rbi-communications

# Polls RBI's Annualpolicy.aspx for new MPC documents (Governor's Statements,
# Resolutions, Minutes). MPC meetings happen ~6-8 times/year on a known
# schedule; we run daily 16:00 IST (10:30 UTC) to catch the post-meeting
# window. RBI's site is server-rendered, no rate-limiting concerns at this
# cadence.
#
# Outcomes:
#   - new doc detected → JSON updated + committed → Streamlit auto-redeploys
#   - no change        → no commit
#   - parser failure   → opens a GitHub issue

on:
  schedule:
    - cron: "30 10 * * *"   # 16:00 IST daily
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: systems/01-rbi-comms

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: systems/01-rbi-comms/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh RBI communications
        id: refresh
        run: |
          set +e
          python scripts/refresh_rbi.py
          rc=$?
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          case $rc in
            0) echo "status=new"      >> "$GITHUB_OUTPUT" ;;
            1) echo "status=nochange" >> "$GITHUB_OUTPUT" ;;
            2) echo "status=fail"     >> "$GITHUB_OUTPUT" ;;
            3) echo "status=partial"  >> "$GITHUB_OUTPUT" ;;
            *) echo "status=fail"     >> "$GITHUB_OUTPUT" ;;
          esac
          echo "Refresh script exit: $rc"
        env:
          PYTHONPATH: ${{ github.workspace }}/systems/01-rbi-comms

      - name: Commit & push if updated
        if: steps.refresh.outputs.status == 'new' || steps.refresh.outputs.status == 'partial'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rbi_communications.json
          if git diff --cached --quiet; then
            echo "No diff to commit"
            exit 0
          fi
          git commit -m "data: autonomous RBI communications refresh ($(date -u +%Y-%m-%d))"
          git push

      - name: Open issue on parser failure
        if: steps.refresh.outputs.status == 'fail' || steps.refresh.outputs.status == 'partial'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0,10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[rbi-refresh] Parser failure on ${today}`,
              body: [
                'The autonomous RBI refresh job failed.',
                '',
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Likely causes:',
                '- RBI changed page structure (check `scrapers/rbi_resolution.py`)',
                '- Annualpolicy.aspx site unreachable (transient)',
                '- New document type the discovery filter doesn\'t match',
              ].join('\n'),
              labels: ['data-pipeline', 'bug', 'rbi-comms'],
            });
