name: scrape-amazon-basket

# Weekly Amazon scrape. Once a week is enough to track inflation movement
# while staying well below any reasonable rate-limit threshold. The scraper is
# tolerant of failure — if Amazon blocks the runner, we just don't update this
# week and try again next Monday.

on:
  schedule:
    - cron: "0 4 * * 1"  # Monday 09:30 IST = 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: systems/02-macro-pulse

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: systems/02-macro-pulse/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Scrape Amazon basket
        id: scrape
        run: |
          set +e
          python scripts/scrape_amazon.py
          rc=$?
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          case $rc in
            0) echo "status=updated" >> "$GITHUB_OUTPUT" ;;
            1) echo "status=blocked" >> "$GITHUB_OUTPUT" ;;
            *) echo "status=fail"    >> "$GITHUB_OUTPUT" ;;
          esac
        env:
          PYTHONPATH: ${{ github.workspace }}/systems/02-macro-pulse

      - name: Commit & push if updated
        if: steps.scrape.outputs.status == 'updated'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/amazon_prices.json
          if git diff --cached --quiet; then
            echo "No diff in amazon_prices.json"
            exit 0
          fi
          git commit -m "data: weekly Amazon basket scrape ($(date -u +%Y-%m-%d))"
          git push

      - name: Report blocked scrape
        if: steps.scrape.outputs.status == 'blocked'
        run: |
          echo "::warning::Amazon returned no results — likely an anti-bot block. Will retry next week."
